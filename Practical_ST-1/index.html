<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Student Result System</h2>
        <input type="number" id="sub1" placeholder="Subject 1 Marks">
        <input type="number" id="sub2" placeholder="Subject 2 Marks">
        <input type="number" id="sub3" placeholder="Subject 3 Marks">

        <h3 id="percentage"></h3>
        <h3 id="result"></h3>
    </div>
    <script src="main.jsx"></script>
