<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smash Karts - Home</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: url(bg.jpeg)no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.2);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 60px;
            color: white;
            margin-bottom: 40px;
            text-shadow: 1px 2px 4px black;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            width: 220px;
            text-align: center;
        }

        .player1 {
            background-color: #ff4757;
            color: white;
        }
        .player1:hover {
            transform: scale(1.08);
            opacity: 0.9;
            background-color: red;
            color: black;
        }

        .player2 {
            background-color: #1e90ff;
            color: white;
        }
        .player2:hover {
            transform: scale(1.08);
            opacity: 0.9;
            background-color: blue;
            color: black;
        }

        .multiplayer {
            background-color: #2ed573;
            color: white;
        }
        .multiplayer:hover {
            transform: scale(1.08);
            opacity: 0.9;
            background-color: green;
            color: black;
        }

        .start {
            background-color: #ffa502;
            color: white;
        }
        .start:hover {
            transform: scale(1.08);
            opacity: 0.9;
            background-color: yellow;
            color: black;
        }

        footer {
            position: absolute;
            bottom: 20px;
            color: rgb(66, 62, 62);
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div class="overlay">
        <h1>SMASH KARTS</h1>

        <div class="btn-container">
            <button class="btn player1">Player 1</button>
            <button class="btn player2">Player 2</button>
            <button class="btn multiplayer">Multiplayer</button>
            <button class="btn start">Start Game</button>
        </div>

        <footer>
            © 2026 Smash Karts Fan Page
        </footer>
    </div>

</body>
</html>
